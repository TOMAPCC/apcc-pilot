version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: apcc
      POSTGRES_PASSWORD: apcc
      POSTGRES_DB: apcc_pilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apcc -d apcc_pilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: sh -c "npx prisma migrate deploy"
    environment:
      DATABASE_URL: postgresql://apcc:apcc@postgres:5432/apcc_pilot?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://apcc:apcc@postgres:5432/apcc_pilot?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
